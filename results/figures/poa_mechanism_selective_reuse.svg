<text x="90.0" y="194.0" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="400" fill="#1f2933">localize -&gt; patch -&gt; review</text>
<rect x="72.0" y="250.0" width="242.0" height="78.0" rx="8.0" ry="8.0" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.1"/>
<text x="90.0" y="278.0" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#1f2933">Trajectory logs</text>
<text x="90.0" y="302.0" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="400" fill="#1f2933">agent choices, handoffs, outcomes</text>
