<rect x="408.0" y="88.0" width="304.0" height="390.0" rx="12.0" ry="12.0" fill="#f8fafc" stroke="#d6dee8" stroke-width="1.0"/>
<text x="426.0" y="118.0" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#1f2933">2  Typed asset store</text>
<rect x="776.0" y="88.0" width="302.0" height="390.0" rx="12.0" ry="12.0" fill="#f8fafc" stroke="#d6dee8" stroke-width="1.0"/>
<text x="794.0" y="118.0" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#1f2933">3  Test-time selective reuse</text>
