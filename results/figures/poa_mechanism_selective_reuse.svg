<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560">
<rect width="100%" height="100%" fill="#fbf7f0"/>
<text x="560.0" y="30.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1f2933">ORCA: Extract, Type, and Selectively Reuse Coordination Assets</text>
<text x="560.0" y="52.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="400" fill="#1f2933">The empirical question is not whether all memory helps, but which asset type transfers under distribution shift.</text>
