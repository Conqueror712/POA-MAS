<text x="560.0" y="525.0" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="#1f2933">Domain 1 evidence: prompt-level procedural assets transfer most clearly; full reuse can over-constrain the workflow.</text>
