<text x="90.0" y="392.0" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#1f2933">Successful patterns</text>
<text x="90.0" y="416.0" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="400" fill="#1f2933">specialization and procedures</text>
