<text x="456.0" y="332.0" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#1f2933">Organization assets</text>
<text x="456.0" y="356.0" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="400" fill="#1f2933">team-level workflow summaries</text>
