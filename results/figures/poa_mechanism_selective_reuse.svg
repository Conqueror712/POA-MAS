<text x="824.0" y="152.0" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#1f2933">Prompt-only reuse</text>
<text x="824.0" y="176.0" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="400" fill="#1f2933">inject procedural guidance</text>
<rect x="806.0" y="214.0" width="242.0" height="60.0" rx="8.0" ry="8.0" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.1"/>
<text x="824.0" y="242.0" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#1f2933">Routing-only reuse</text>
<text x="824.0" y="266.0" text-anchor="start" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="400" fill="#1f2933">assign subtasks from role assets</text>
